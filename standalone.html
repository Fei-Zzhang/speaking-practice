          const resultHtml = result ? (function () {
            return `
              <div class="card">
                <h2>评测结果</h2>
                ${studentTranscriptHtml(result)}
                <p style="color:var(--muted);font-size:0.9rem;margin-top:0.75rem;white-space:pre-wrap">${escapeHtml(buildSpeakingFeedback(result) || '')}</p>
                ${modelAnswerHtml(result)}
                ${debugApiResponseHtml(result)}
              </div>
            `;
          })() : '';

          root.innerHTML = `
            <div class="header"><h1>Upload Recording</h1><div class="header-right"><button data-action="backMain">返回</button> ${headerRight()}</div></div>
            <div class="card">
              <h2>上传录音文件</h2>
              <p style="color:var(--muted);margin-top:0.5rem;font-size:0.9rem">支持 mp3 / m4a / wav 等音频格式，时长建议在 45 秒左右。</p>
              <input type="file" id="uploadAudioFile" accept="audio/*" style="margin-top:0.75rem">
              <button class="primary" id="btnUploadEval" style="margin-top:0.75rem" ${loading ? 'disabled' : ''}>开始评测</button>
              <p style="color:var(--muted);font-size:0.8rem;margin-top:0.5rem">录音内容将发送到本机口语评测后端和语法检查服务，仅用于本地练习。</p>
            </div>
            ${statusHtml}
            ${error ? '<div class="card" style="border-color:var(--wrong);color:var(--wrong)"><strong>' + escapeHtml(error) + '</strong></div>' : ''}
            ${resultHtml}
          `;

          root.querySelector('[data-action=backMain]').onclick = function () {
            state.mainChoice = null;
            state.realTestLoading = false;
            state.realTestError = '';
            state.realTestResult = null;
            render();
          };

          const btnUpload = document.getElementById('btnUploadEval');
          const fileInput = document.getElementById('uploadAudioFile');
          if (btnUpload && !loading) {
            btnUpload.onclick = function () {
              const file = fileInput && fileInput.files && fileInput.files[0];
              if (!file) {
                alert('请先选择一个录音文件。');
                return;
              }
              const fd = new FormData();
              fd.append('audio', file, file.name);
              // 上传录音不必强制有参考文本，evalMode=3 使用自由说模式
              fd.append('refText', '');
              fd.append('evalMode', '3');
              state.realTestLoading = true;
              state.realTestError = '';
              state.realTestResult = null;
              render();
              fetch(API_BASE + '/api/asr-eval', { method: 'POST', body: fd })
                .then(r => r.json().catch(() => ({})))
                .then(data => {
                  if (!data || data.ok === false) {
                    state.realTestError = data && data.error ? data.error : '口语评测失败，请稍后重试。';
                    state.realTestResult = null;
                    state.realTestLoading = false;
                    render();
                    return;
                  }
                  state.realTestError = '';
                  state.realTestResult = data;
                  state.realTestLoading = false;
                  render();
                })
                .catch(() => {
                  state.realTestLoading = false;
                  state.realTestError = '无法连接口语评测后端，请确认本机 http://localhost:5001 已运行。';
                  state.realTestResult = null;
                  render();
                });
            };
          }
          return;
        }

        // Mock Test：四部分入口
        if (state.mainChoice === 'mock' && state.mockPart === null) {
          root.innerHTML = `
            <div class="header"><h1>Mock Test</h1><div class="header-right"><button data-action="backMain">返回</button> ${headerRight()}</div></div>
            <p style="color:var(--muted);margin-bottom:1rem">选择练习部分</p>
            <div class="card" data-action="mockPart" data-part="grammar">
              <h2>Grammar</h2>
              <p>语法练习：级别1 选择题、级别2 填空题、级别3 引导造句（语音转文字，正确后 AI 提示）。题库来自 grammartestmaterial。</p>
              <button class="primary" style="margin-top:0.5rem">进入</button>
            </div>
            <div class="card" data-action="mockPart" data-part="wording">
              <h2>Wording</h2>
              <p>措辞练习：碎片重组 + 连词成句。初阶/中阶/高阶，每日 5+5 题。题库来自 wordingtestmaterial。</p>
              <button class="primary" style="margin-top:0.5rem">进入</button>
            </div>

              <button disabled style="margin-top:0.5rem;opacity:0.7">暂未开放</button>
            </div>

              <h2>Topic Development</h2>
              <p>话题展开：初阶选词/合并/改错；中阶易混淆词/改写/改错；高阶段落填空/重组/自由写作。题库来自 topicdevelopmenttestmaterial。</p>
              <button class="primary" style="margin-top:0.5rem">进入</button>
            </div>
          `;
          root.querySelectorAll('[data-action=mockPart]').forEach(btn => {

              btn.onclick = () => { state.mockPart = btn.dataset.part; state.grammarTopicId = null; state.grammarLevel = null; state.wordingTier = null; state.topicTier = null; render(); };

          root.querySelector('[data-action=backMain]').onclick = () => { state.mainChoice = null; render(); };
          root.querySelector('[data-action=logout]').onclick = () => { clearCurrentUser(); state.mainChoice = null; state.mockPart = null; render(); };
          return;
        }

        // ---------- 总结页（完成并保存后进入） ----------
        if (state.mainChoice === 'mock' && state.summaryView && state.summaryData) {
          var d = state.summaryData;
          var total = d.total || 0;
          var correctCount = d.correctCount;
          var hasScore = correctCount != null;
          var pct = hasScore && total ? Math.round((correctCount / total) * 100) : 0;
          var scoreLine = hasScore ? '正确率：<strong>' + correctCount + '/' + total + '</strong> 题（' + pct + '%）' : '共 ' + total + ' 题（语音/自由作答，见下方逐题对照）';

          root.innerHTML = `
            <div class="header"><h1>练习总结</h1><div class="header-right"><button id="summaryBack">返回</button> ${headerRight()}</div></div>

          document.getElementById('summaryBack2').onclick = function () { state.summaryView = null; state.summaryData = null; render(); };
          return;
        }

        // ---------- Grammar ----------
        if (state.mockPart === 'grammar') {
          const topics = window.MOCK_GRAMMAR_TOPICS || [];
          if (!state.grammarTopicId) {
            root.innerHTML = `
              <div class="header"><h1>Grammar</h1><div class="header-right"><button data-action="backMock">返回 Mock Test</button> ${headerRight()}</div></div>
              <p style="color:var(--muted);margin-bottom:1rem">选择语法主题</p>
              ${topics.map(t => `
                <div class="card" data-topic-id="${t.id}">
                  <h2>${t.title}</h2>
                  <p style="font-size:0.9rem">级别1 选择题 · 级别2 填空题 · 级别3 引导造句（语音）</p>
                  <button class="primary" style="margin-top:0.5rem" data-grammar-topic="${t.id}">开始</button>
                </div>

            `;
            root.querySelectorAll('[data-grammar-topic]').forEach(btn => {
              btn.onclick = (e) => { e.stopPropagation(); state.grammarTopicId = btn.dataset.grammarTopic; state.grammarLevel = null; state.grammarIndex = 0; state.grammarAnswers = {}; state.grammarSubmitted = false; render(); };
            });
            root.querySelector('[data-action=backMock]').onclick = () => { state.mockPart = null; render(); };
            return;
          }
          const topic = topics.find(t => t.id === state.grammarTopicId);
          if (!topic) { state.grammarTopicId = null; render(); return; }
          if (state.grammarLevel === null) {
            root.innerHTML = `
              <div class="header"><h1>${topic.title}</h1><div class="header-right"><button data-action="backGrammarTopic">返回</button> ${headerRight()}</div></div>
              ${state.saveFeedback ? '<div class="card ai-prompt-box" style="margin-bottom:1rem">' + escapeHtml(state.saveFeedback) + '</div>' : ''}
              <p style="color:var(--muted);margin-bottom:1rem">选择级别</p>
              <div class="card" data-level="1"><h2>级别 1</h2><p>选择题</p><button class="primary" data-set-level="1">开始</button></div>
              <div class="card" data-level="2"><h2>级别 2</h2><p>填空题</p><button class="primary" data-set-level="2">开始</button></div>
              <div class="card" data-level="3"><h2>级别 3</h2><p>引导造句（语音转文字，不需对接 API，正确后 AI 提示）</p><button class="primary" data-set-level="3">开始</button></div>
            `;
            root.querySelectorAll('[data-set-level]').forEach(btn => {
              btn.onclick = (e) => { e.stopPropagation(); state.grammarLevel = parseInt(btn.dataset.setLevel, 10); state.grammarIndex = 0; state.grammarAnswers = {}; state.grammarSubmitted = false; state.saveFeedback = ''; render(); };
            });
            root.querySelector('[data-action=backGrammarTopic]').onclick = () => { state.grammarTopicId = null; state.saveFeedback = ''; render(); };
            return;
          }
          // Grammar 做题 / 结果
          if (state.grammarLevel === 1 && topic.level1) {
            const qs = topic.level1.questions;
            const idx = state.grammarIndex;
            const q = qs[idx];
            if (!q) { state.grammarLevel = null; state.grammarIndex = 0; render(); return; }
            const submitted = state.grammarSubmitted;
            const selected = state.grammarAnswers['l1_' + idx];
            const correct = selected === q.correctIndex;
            root.innerHTML = `
              <div class="header"><h1>${topic.title} · 级别1</h1><div class="header-right"><button data-action="backGrammarLevel">返回</button> ${headerRight()}</div></div>
              <div class="card">
                <p style="color:var(--text);margin-bottom:1rem">${idx + 1}. ${q.q}</p>
                <div class="mcq-options">
                  ${q.options.map((opt, i) => `
                    <label class="mcq-option">
                      <input type="radio" name="g1" value="${i}" ${selected === i ? 'checked' : ''} ${submitted ? 'disabled' : ''}>
                      <span>${opt}</span>${submitted && i === q.correctIndex ? ' <span style="color:var(--correct)">✓ 正确</span>' : ''}
                    </label>
                  `).join('')}
                </div>
                ${submitted ? '<p class="ai-prompt-box" style="margin-top:1rem">' + (correct ? '回答正确！' : '正确答案为：' + q.options[q.correctIndex]) + '</p>' : ''}
              </div>
              <div class="actions">
                <button data-action="backGrammarLevel">返回</button>
                ${idx > 0 ? '<button data-action="grammarPrev">上一题</button>' : ''}

              </div>

            if (document.getElementById('grammarSubmit')) {
              document.getElementById('grammarSubmit').onclick = () => {
                const el = root.querySelector('input[name="g1"]:checked');

                state.grammarAnswers['l1_' + idx] = parseInt(el.value, 10);

                render();

            if (document.getElementById('grammarFinishL1')) {
              document.getElementById('grammarFinishL1').onclick = function () {
                var qs = topic.level1.questions;
                var total = qs.length;
                var correct = 0;
                for (var i = 0; i < total; i++) { if (state.grammarAnswers['l1_' + i] === qs[i].correctIndex) correct++; }
                var items = qs.map(function (q, i) {
                  var sel = state.grammarAnswers['l1_' + i];
                  return { label: q.q, userAnswer: q.options[sel], correctAnswer: q.options[q.correctIndex], correct: sel === q.correctIndex };
                });
                saveMockPractice({ sectionId: 'mock-grammar-' + topic.id + '-level1', sectionTitle: topic.title + ' · 级别1', answers: state.grammarAnswers, correctCount: correct, extra: null }, function (err, where) {
                  state.saveFeedback = err ? err : (where === '云端' ? '已保存到云端。正确 ' + correct + '/' + total + ' 题' : '已保存到本地。正确 ' + correct + '/' + total + ' 题');
                  state.summaryView = 'grammar';
                  state.summaryData = { sectionTitle: topic.title + ' · 级别1', total: total, correctCount: correct, items: items };
                  state.grammarLevel = null; state.grammarIndex = 0; state.grammarSubmitted = false; render();
                });
              };
            }
            root.querySelector('[data-action=grammarPrev]') && (root.querySelector('[data-action=grammarPrev]').onclick = () => { state.grammarIndex--; state.grammarSubmitted = false; render(); });
            root.querySelector('[data-action=grammarNext]') && (root.querySelector('[data-action=grammarNext]').onclick = () => { state.grammarIndex++; state.grammarSubmitted = false; render(); });
            root.querySelector('[data-action=backGrammarLevel]').onclick = () => { state.grammarLevel = null; state.grammarIndex = 0; state.grammarSubmitted = false; state.saveFeedback = ''; render(); };
            return;
          }
          if (state.grammarLevel === 2 && topic.level2) {
            const qs = topic.level2.questions;
            const idx = state.grammarIndex;
            const q = qs[idx];
            if (!q) { state.grammarLevel = null; state.grammarIndex = 0; render(); return; }
            const submitted = state.grammarSubmitted;
            const userAns = (state.grammarAnswers['l2_' + idx] || '').trim().toLowerCase();
            const correct = userAns === q.answer.toLowerCase();
            root.innerHTML = `
              <div class="header"><h1>${topic.title} · 级别2</h1><div class="header-right"><button data-action="backGrammarLevel">返回</button> ${headerRight()}</div></div>
              <div class="card">
                <p style="color:var(--text);margin-bottom:0.5rem">${idx + 1}. ${q.prompt}</p>
                <input type="text" class="fill-input" id="grammarFill" placeholder="填写答案" value="${submitted ? userAns : (state.grammarAnswers['l2_' + idx] || '')}" ${submitted ? 'readonly' : ''} />
                ${submitted ? '<p class="ai-prompt-box">' + (correct ? '回答正确！' : '正确答案：' + q.answer) + '</p>' : ''}
              </div>
              <div class="actions">
                <button data-action="backGrammarLevel">返回</button>
                ${idx > 0 ? '<button data-action="grammarPrev">上一题</button>' : ''}

            if (document.getElementById('grammarSubmit2')) {

                state.grammarAnswers['l2_' + idx] = (document.getElementById('grammarFill').value || '').trim();
                state.grammarSubmitted = true;
                render();

            if (document.getElementById('grammarFinishL2')) {
              document.getElementById('grammarFinishL2').onclick = function () {

                var items = qs.map(function (q, i) {
                  var u = (state.grammarAnswers['l2_' + i] || '').trim();
                  var ok = u.toLowerCase() === q.answer.toLowerCase();
                  return { label: q.prompt, userAnswer: u || '—', correctAnswer: q.answer, correct: ok };

                saveMockPractice({ sectionId: 'mock-grammar-' + topic.id + '-level2', sectionTitle: topic.title + ' · 级别2', answers: state.grammarAnswers, correctCount: correct, extra: null }, function (err, where) {
                  state.saveFeedback = err ? err : (where === '云端' ? '已保存到云端。正确 ' + correct + '/' + total + ' 题' : '已保存到本地。正确 ' + correct + '/' + total + ' 题');
                  state.summaryView = 'grammar';
                  state.summaryData = { sectionTitle: topic.title + ' · 级别2', total: total, correctCount: correct, items: items };
                  state.grammarLevel = null; state.grammarIndex = 0; state.grammarSubmitted = false; render();

            root.querySelector('[data-action=grammarPrev]') && (root.querySelector('[data-action=grammarPrev]').onclick = () => { state.grammarIndex--; state.grammarSubmitted = false; render(); });

              ${!submitted ? `
                <div class="card">
                  <p style="font-size:0.9rem;color:var(--muted)">使用下方「开始录音」进行语音转文字（浏览器识别，不对接 API），完成后提交。</p>
                  <button class="primary" id="btnStartGrammar">开始录音</button>
                  <div class="transcript-box" id="grammarTranscript" style="margin-top:0.75rem">${transcript || '（点击开始录音后说话）'}</div>
                  <button class="primary" id="grammarSubmit3" style="margin-top:0.5rem">提交并查看 AI 提示</button>
                </div>
              ` : `
                <div class="card">

        // ---------- Wording ----------
        if (state.mockPart === 'wording') {

          if (!state.wordingTier) {

              <div class="card" data-tier="intermediate"><h2>中阶</h2><p>托福理由句 + 流畅连接</p><button class="primary" data-set-tier="intermediate">进入</button></div>
              <div class="card" data-tier="advanced"><h2>高阶</h2><p>观点+理由+逻辑链</p><button class="primary" data-set-tier="advanced">进入</button></div>

          }
          const days = wording[state.wordingTier] || [];
          if (state.wordingDay === null) {
            root.innerHTML = `
              <div class="header"><h1>Wording · ${state.wordingTier === 'beginner' ? '初阶' : state.wordingTier === 'intermediate' ? '中阶' : '高阶'}</h1><div class="header-right"><button data-action="backWordingTier">返回</button> ${headerRight()}</div></div>

              ${days.map(d => `
                <div class="card">
                  <h2>Day ${d.day}</h2>
                  <p>碎片重组 5 题 + 连词成句 5 题</p>
                  <button class="primary" data-day="${d.day}" style="margin-top:0.5rem">开始</button>
                </div>

            `;
            root.querySelectorAll('[data-day]').forEach(btn => {
              btn.onclick = (e) => {
                e.stopPropagation();
                state.wordingDay = parseInt(btn.dataset.day, 10);
                state.wordingType = 'reorder';
                state.wordingIndex = 0;
                state.wordingAnswers = {};
                state.wordingSubmitted = false;
                state.wordingShuffled = {};
                state.saveFeedback = '';

                render();
              };

          }
          const dayData = days.find(d => d.day === state.wordingDay);
          if (!dayData) { state.wordingDay = null; render(); return; }
          if (state.wordingType === 'reorder') {
            const items = dayData.reorder || [];

            const isAdvanced = state.wordingTier === 'advanced';
            const isIntermediate = state.wordingTier === 'intermediate';
            const isShuffled = isAdvanced || isIntermediate;
            const correctParts = prompt.split(/\s*\/\s*/);
            const shuffleKey = dayData.day + '_' + idx;
            if (isShuffled && !state.wordingShuffled[shuffleKey]) {
              state.wordingShuffled[shuffleKey] = shuffleArray(correctParts);
            }
            const displayPrompt = isShuffled ? (state.wordingShuffled[shuffleKey] || correctParts).join(' / ') : prompt;
            const correctSentence = correctParts.join(' ').toLowerCase().replace(/\s+/g, ' ').trim();
            const userAns = (state.wordingAnswers['reorder_' + idx] || '').trim();
            const submitted = state.wordingSubmitted;
            const userNorm = userAns.toLowerCase().replace(/\s+/g, ' ').trim();

            if (isAdvanced) {

                <div class="header"><h1>Wording · 高阶 · Day ${dayData.day} · 碎片重组</h1><div class="header-right"><button data-action="backWordingDay">返回</button> ${headerRight()}</div></div>

                    state.wordingSubmitted = true;
                    render();
                  };
                }
              }

              var reorderCorrectB = submitted && userNorm === correctSentence;
              root.innerHTML = `
                <div class="header"><h1>Wording · ${isIntermediate ? '中阶' : '初阶'} · Day ${dayData.day} · 碎片重组</h1><div class="header-right"><button data-action="backWordingDay">返回</button> ${headerRight()}</div></div>

                  <p style="color:var(--muted);font-size:0.9rem">${displayPrompt}</p>
                  <input type="text" class="fill-input" id="wordingReorder" placeholder="输入完整句子" value="${submitted ? userAns : userAns}" ${submitted || state.wordingTimeUp ? 'readonly' : ''} style="max-width:100%" />
                  ${submitted ? '<p class="ai-prompt-box">' + (reorderCorrectB ? '正确！' : '参考答案：' + correctParts.join(' ')) + '</p>' : ''}

                <div class="actions">
                  <button data-action="backWordingDay">返回</button>

                  ${!submitted ? '<button class="primary" id="wordingSubmitReorder"' + timeUpDisabled + '>提交对答案</button>' : (idx < items.length - 1 ? '<button class="primary" data-action="wordingNext"' + timeUpDisabled + '>下一题</button>' : '<button class="primary" data-action="wordingToLink"' + timeUpDisabled + '>进入连词成句</button>')}
                </div>

              var inp = document.getElementById('wordingReorder');
              if (inp && !submitted && !state.wordingTimeUp) inp.oninput = function () { state.wordingAnswers['reorder_' + idx] = inp.value; };
              if (document.getElementById('wordingSubmitReorder')) {
                document.getElementById('wordingSubmitReorder').onclick = function () { state.wordingAnswers['reorder_' + idx] = (inp && inp.value) || ''; state.wordingSubmitted = true; render(); };
              }

            root.querySelector('[data-action=wordingPrev]') && (root.querySelector('[data-action=wordingPrev]').onclick = function () { state.wordingIndex--; state.wordingSubmitted = false; render(); });
            root.querySelector('[data-action=wordingNext]') && (root.querySelector('[data-action=wordingNext]').onclick = function () { state.wordingIndex++; state.wordingSubmitted = false; render(); });
            root.querySelector('[data-action=wordingToLink]') && (root.querySelector('[data-action=wordingToLink]').onclick = function () { state.wordingType = 'link'; state.wordingIndex = 0; state.wordingSubmitted = false; render(); });
            root.querySelector('[data-action=backWordingDay]').onclick = function () { state.wordingDay = null; state.wordingShuffled = {}; stopWordingTimer(); render(); };
            return;
          }
          if (state.wordingType === 'link') {
            const items = dayData.link || [];
            const idx = state.wordingIndex != null ? state.wordingIndex : 0;
            const item = items[idx];

            const userAns = (state.wordingAnswers['link_' + idx] || '').trim();
            const submitted = state.wordingSubmitted;
            const correct = userAns.toLowerCase().replace(/\s+/g, ' ') === (item.answer || '').toLowerCase().replace(/\s+/g, ' ');
            const timeLimitLink = getWordingTimeLimit(state.wordingTier);
            const countdownHtmlLink = state.wordingTimeUp

                <p style="color:var(--text)">${idx + 1}. 用 (${item.connector}) 合并两句：</p>

                <input type="text" class="fill-input" id="wordingLink" placeholder="合并后的句子" value="${submitted ? userAns : userAns}" ${submitted || state.wordingTimeUp ? 'readonly' : ''} style="max-width:100%" />

            if (document.getElementById('wordingFinishDay')) {
              document.getElementById('wordingFinishDay').onclick = function () {
                var reorderItems = dayData.reorder || [];

                  var u2 = (state.wordingAnswers['link_' + j] || '').trim().toLowerCase().replace(/\s+/g, ' ');
                  var ok2 = u2 === (linkItems[j].answer || '').toLowerCase().replace(/\s+/g, ' ');

                var correct = reorderCorrect + linkCorrect;

                  state.saveFeedback = err ? err : (where === '云端' ? '已保存到云端。正确 ' + correct + '/' + total + ' 题' : '已保存到本地。正确 ' + correct + '/' + total + ' 题');

        // ---------- Pronunciation 占位 ----------
        if (state.mockPart === 'pronunciation') {

            <div class="header"><h1>Pronunciation</h1><div class="header-right"><button data-action="backMock">返回 Mock Test</button> ${headerRight()}</div></div>

        if (state.mockPart === 'topic') {

            root.innerHTML = `
              <div class="header"><h1>Topic Development</h1><div class="header-right"><button data-action="backMock">返回 Mock Test</button> ${headerRight()}</div></div>
              <p style="color:var(--muted);margin-bottom:1rem">选择阶段</p>

              <div class="card" data-tier="intermediate"><h2>中阶</h2><p>易混淆词、改写、改错</p><button class="primary" data-set-topic-tier="intermediate">进入</button></div>
              <div class="card" data-tier="advanced"><h2>高阶</h2><p>段落填空、重组、自由写作</p><button class="primary" data-set-topic-tier="advanced">进入</button></div>
            `;
            root.querySelectorAll('[data-set-topic-tier]').forEach(btn => {
              btn.onclick = (e) => { e.stopPropagation(); state.topicTier = btn.dataset.setTopicTier; state.topicSection = null; state.topicAnswers = {}; state.topicSubmitted = false; render(); };
            });
            root.querySelector('[data-action=backMock]').onclick = () => { state.mockPart = null; render(); };
            return;
          }
          const tier = topicData[state.topicTier];
          if (!tier) { state.topicTier = null; render(); return; }
          if (state.topicSection === null) {
            const sections = state.topicTier === 'beginner' ? ['fillBlank', 'merge', 'fixError'] : state.topicTier === 'intermediate' ? ['fillBlank', 'rewrite', 'fixError'] : ['paragraphFill', 'reorder', 'freeWrite'];
            const names = state.topicTier === 'beginner' ? ['选词填空', '合并句子', '改错'] : state.topicTier === 'intermediate' ? ['选词填空（易混淆）', '改写句子', '改错'] : ['段落填空', '重组段落', '自由写作'];

                <div class="card"><h2>${names[i]}</h2><button class="primary" data-topic-sec="${s}" style="margin-top:0.5rem">进入</button></div>

              btn.onclick = (e) => { e.stopPropagation(); state.topicSection = btn.dataset.topicSec; state.topicIndex = 0; state.topicAnswers = {}; state.topicSubmitted = false; state.saveFeedback = ''; render(); };

            return;
          }

          const sectionData = tier[sec];
          if (!sectionData) { state.topicSection = null; render(); return; }
          if (sec === 'fillBlank' && sectionData.items) {
            const idx = state.topicIndex != null ? state.topicIndex : 0;
            const item = sectionData.items[idx];
            if (!item) { state.topicSection = null; render(); return; }
            const userAns = (state.topicAnswers['fb_' + idx] || '').trim();
            const submitted = state.topicSubmitted;

          const showEdit = state.isEditing;
          root.innerHTML = `
            <div class="header"><h1>口语练习</h1>${headerRightWrap()}</div>
            <div class="card">
              <h2>${section.title} · 口语作答</h2>
              <p style="color:var(--text);margin:0.5rem 0">${section.speakingPrompt}</p>
              <p style="font-size:0.85rem;color:var(--muted)">使用浏览器语音转文字，点击「开始答题」后 45 秒倒计时。允许在提交前修改一次文本。</p>
            </div>
            ${showStart ? '<div class="card"><button class="primary" id="btnStart">开始答题</button></div>' : ''}
            ${showCountdown ? `
              <div class="card countdown-box ${state.secondsLeft <= 10 ? 'warn' : ''}">
                <span class="num" id="countdownNum">${state.secondsLeft}</span>
                <span style="color:var(--muted)">秒</span>
                ${state.phase === 'done' ? '<p style="margin:0.75rem 0 0;color:var(--warning)">时间到</p>' : ''}
              </div>
              ${!showEdit ? `
                <div class="card">
                  <p style="font-size:0.9rem;color:var(--muted)">当前内容（语音转写）</p>
                  <div class="transcript-box" id="transcriptBox">${state.transcript || '（正在识别…）'}</div>
                  ${state.phase === 'done' && state.editCount < 1 ? '<button id="btnEdit">修改文本（还可修改 1 次）</button>' : ''}
                  ${state.editCount >= 1 ? '<span style="font-size:0.9rem;color:var(--muted)">已使用二次修改</span>' : ''}
                </div>
              ` : `
                <div class="card">
                  <p style="font-size:0.9rem;color:var(--muted)">修改后的文本</p>
                  <textarea class="edit-area" id="editArea" rows="6">${state.finalText}</textarea>
                  <div class="actions">
                    <button id="btnCancelEdit">取消</button>
                    <button class="primary" id="btnSaveEdit">保存（算作第二次修改）</button>
                  </div>
                </div>
              `}
              ${state.phase === 'done' ? `
                <div class="actions">
                  <button data-action="back">返回</button>
                  <button class="primary" id="btnSubmit">提交并批改</button>
                </div>
              ` : ''}
            ` : ''}
          `;

          if (document.getElementById('btnStart')) {
            document.getElementById('btnStart').onclick = function () {
              const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
              if (!SpeechRecognition) { alert('当前浏览器不支持语音识别，请使用 Chrome 或 Edge。'); return; }
              if (timerId) clearInterval(timerId);
              timerId = null;
              state.phase = 'counting'; state.secondsLeft = SPEAKING_DURATION; state.transcript = ''; state.editCount = 0; state.isEditing = false;
              recognition = new SpeechRecognition();
              recognition.continuous = true;
              recognition.interimResults = true;
              recognition.lang = 'en-US';
              recognition.onresult = function (e) {
                state.transcript = Array.from(e.results).map(r => r[0].transcript).join('');
                const box = document.getElementById('transcriptBox');
                if (box) box.textContent = state.transcript || '（正在识别…）';
              };
              recognition.start();
              render();
              function tick() {
                state.secondsLeft--;
                const el = document.getElementById('countdownNum');
                if (el) el.textContent = state.secondsLeft;
                if (state.secondsLeft <= 0) { stopRecognition(); state.phase = 'done'; clearInterval(timerId); timerId = null; render(); return; }
                if (state.secondsLeft <= 10 && el) el.parentElement.classList.add('warn');
              }
              timerId = setInterval(tick, 1000);
            };
          }

          const backBtns = root.querySelectorAll('[data-action=back]');
          backBtns.forEach(b => b.onclick = () => { stopRecognition(); if (timerId) clearInterval(timerId); timerId = null; state.view = 'list'; state.sectionId = null; render(); });
          const logoutSp = root.querySelector('[data-action=logout]');
          if (logoutSp) logoutSp.onclick = () => { stopRecognition(); if (timerId) clearInterval(timerId); timerId = null; clearCurrentUser(); state.view = 'list'; state.sectionId = null; render(); };

          if (document.getElementById('btnEdit')) {
            document.getElementById('btnEdit').onclick = () => { state.isEditing = true; state.finalText = state.transcript; render(); };
          }
          if (document.getElementById('btnCancelEdit')) {
            document.getElementById('btnCancelEdit').onclick = () => { state.isEditing = false; render(); };
          }
          if (document.getElementById('btnSaveEdit')) {
            document.getElementById('btnSaveEdit').onclick = () => { state.transcript = document.getElementById('editArea').value; state.editCount++; state.isEditing = false; render(); };
          }
          if (document.getElementById('btnSubmit')) {
            document.getElementById('btnSubmit').onclick = function () {
              const text = (state.isEditing ? document.getElementById('editArea').value : state.transcript).trim();
              if (!text) { alert('请先完成口语内容再提交。'); return; }
              if (API_NODE) {
                fetch(API_NODE + '/api/practice', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    username: getCurrentUser(),
                    sectionId: section.id,
                    sectionTitle: section.title,
                    mcqAnswers: state.mcqAnswers,
                    mcqScore: state.mcqScore,
                    speakingText: text
                  })
                }).then(function (r) {
                  return r.json().then(function (data) {
                    if (data.ok) alert('已提交并保存到云数据库。');
                    else alert(data.message || ('HTTP ' + r.status + ' 提交失败'));
                  }, function () { alert('HTTP ' + r.status + '：服务器异常，请查看后端终端'); });
                }).catch(function () { alert('网络错误，未保存到云端。请确认 Node 后端已启动。'); });
              } else {
                alert('已提交。\n\n（配置 API_NODE 后，数据会保存到云数据库。）');
              }
            };
          }
          return;
        }

        render();
      }

      render();
    })();
    } catch (e) {
      document.getElementById('root').innerHTML = '<div style="padding:2rem;font-family:system-ui;color:#1d1d1f;background:#fff;min-height:100vh"><h1 style="color:#ef4444">页面报错</h1><pre style="overflow:auto;background:#f5f5f7;padding:1rem;border-radius:8px;border:1px solid #e0e0e5">' + (e && e.message ? e.message : String(e)) + '</pre><p>请按 F12 打开控制台查看完整错误。</p></div>';
    }
  </script>
</body>
</html>
